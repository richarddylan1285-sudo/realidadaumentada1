<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA: Sólidos Geométricos con Anotaciones</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            
            <a-entity position="0 0 0" scale="0.7 0.7 0.7">
                
                <a-entity position="-1.5 0.5 0">
                    <a-box position="0 0 0" material="color: #4CC3D9; opacity: 0.8; transparent: true;" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear; pauseEvents: click"></a-box>

                    <a-line start="0 0 0.5" end="0 0.8 0.8" color="#FFF"></a-line>
                    <a-text value="Cara" position="0 0.9 0.8" scale="0.5 0.5 0.5" align="center" color="#000" geometry="primitive: plane; width: 0.6; height: 0.25" material="color: #FFF; shader: flat"></a-text>

                    <a-line start="0.5 0.5 0.5" end="0.9 1 0.5" color="#FFF"></a-line>
                    <a-text value="Vertice" position="0.9 1.1 0.5" scale="0.5 0.5 0.5" align="center" color="#000" geometry="primitive: plane; width: 0.8; height: 0.25" material="color: #FFF; shader: flat"></a-text>

                    <a-line start="0.5 0 0.5" end="1 -0.5 0.5" color="#FFF"></a-line>
                    <a-text value="Arista" position="1 -0.6 0.5" scale="0.5 0.5 0.5" align="center" color="#000" geometry="primitive: plane; width: 0.7; height: 0.25" material="color: #FFF; shader: flat"></a-text>
                </a-entity>

                <a-entity position="1.5 0.5 0">
                    <a-cylinder position="0 0 0" radius="0.5" height="1.2" material="color: #FFC65D; opacity: 0.8; transparent: true;"></a-cylinder>

                    <a-line start="0 0.6 0" end="0 1.2 0.5" color="#FFF"></a-line>
                    <a-text value="Base Superior" position="0 1.3 0.5" scale="0.5 0.5 0.5" align="center" color="#000" geometry="primitive: plane; width: 1.4; height: 0.25" material="color: #FFF; shader: flat"></a-text>

                    <a-line start="0.5 0 0" end="1.1 0.3 0" color="#FFF"></a-line>
                    <a-text value="Superficie\nCurva" position="1.1 0.5 0" scale="0.5 0.5 0.5" align="center" color="#000" geometry="primitive: plane; width: 1.2; height: 0.4" material="color: #FFF; shader: flat"></a-text>

                    <a-line start="-0.6 -0.6 0" end="-0.6 0.6 0" color="#FF3333"></a-line>
                    <a-text value="Altura (h)" position="-1 0 0" scale="0.5 0.5 0.5" align="center" color="#FFF"></a-text>
                </a-entity>

            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>
    
</body>
</html>
