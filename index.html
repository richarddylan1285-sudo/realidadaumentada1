<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>RA - Sólidos Geométricos AR</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- AR.js -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        overflow:hidden;
    }

    /* Menú flotante */
    #menu{
        position:fixed;
        bottom:20px;
        left:50%;
        transform:translateX(-50%);
        display:flex;
        gap:10px;
        z-index:999;
        background:rgba(0,0,0,0.65);
        padding:12px;
        border-radius:15px;
        backdrop-filter:blur(5px);
    }

    .btn{
        border:none;
        padding:12px 18px;
        border-radius:10px;
        color:white;
        cursor:pointer;
        font-weight:bold;
        transition:0.3s;
    }

    .btn:hover{
        transform:scale(1.05);
    }

    .cubo{
        background:#2196F3;
    }

    .esfera{
        background:#4CAF50;
    }

    .cilindro{
        background:#FF9800;
    }

    @media(max-width:600px){
        #menu{
            width:95%;
            justify-content:center;
            flex-wrap:wrap;
        }

        .btn{
            flex:1;
            min-width:90px;
        }
    }
</style>
</head>

<body>

<!-- MENÚ -->
<div id="menu">
    <button class="btn cubo" onclick="mostrarFigura('cubo')">
        Cubo
    </button>

    <button class="btn esfera" onclick="mostrarFigura('esfera')">
        Esfera
    </button>

    <button class="btn cilindro" onclick="mostrarFigura('cilindro')">
        Cilindro
    </button>
</div>

<!-- ESCENA AR -->
<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
>

    <!-- Marcador Hiro -->
    <a-marker preset="hiro">

        <!-- CUBO -->
        <a-box
            id="cubo"
            position="0 0.5 0"
            depth="1"
            height="1"
            width="1"
            color="#2196F3"
            visible="true"
            animation="property: rotation;
                       to: 0 360 0;
                       loop: true;
                       dur: 6000;
                       easing: linear;">
        </a-box>

        <!-- ESFERA -->
        <a-sphere
            id="esfera"
            position="0 0.7 0"
            radius="0.6"
            color="#4CAF50"
            visible="false"
            animation="property: rotation;
                       to: 0 360 0;
                       loop: true;
                       dur: 6000;
                       easing: linear;">
        </a-sphere>

        <!-- CILINDRO -->
        <a-cylinder
            id="cilindro"
            position="0 0.7 0"
            radius="0.5"
            height="1.2"
            color="#FF9800"
            visible="false"
            animation="property: rotation;
                       to: 0 360 0;
                       loop: true;
                       dur: 6000;
                       easing: linear;">
        </a-cylinder>

        <!-- Bordes del cubo -->
        <a-box
            position="0 0.5 0"
            depth="1.02"
            height="1.02"
            width="1.02"
            material="color:black; wireframe:true"
            visible="true"
            id="bordeCubo">
        </a-box>

    </a-marker>

    <!-- Cámara -->
    <a-entity camera></a-entity>

</a-scene>

<script>

/*
==================================================
FUNCIÓN PARA CAMBIAR ENTRE FIGURAS
==================================================
*/
function mostrarFigura(figuraSeleccionada){

    // Ocultar todas las figuras
    document.querySelector('#cubo').setAttribute('visible', false);
    document.querySelector('#esfera').setAttribute('visible', false);
    document.querySelector('#cilindro').setAttribute('visible', false);

    // Ocultar borde del cubo
    document.querySelector('#bordeCubo')
            .setAttribute('visible', false);

    // Mostrar figura seleccionada
    document.querySelector('#' + figuraSeleccionada)
            .setAttribute('visible', true);

    // Mostrar borde solamente cuando sea cubo
    if(figuraSeleccionada === 'cubo'){
        document.querySelector('#bordeCubo')
                .setAttribute('visible', true);
    }
}

</script>

</body>
</html>
