<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RA - Sólidos Geométricos</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

#menu{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    z-index:999;
    width:95%;
}

#menu button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.cubo{background:#2196F3;}
.esfera{background:#4CAF50;}
.cilindro{background:#FF9800;}
.tetraedro{background:#9C27B0;}
.octaedro{background:#E91E63;}

#info{
    position:fixed;
    top:10px;
    left:10px;
    z-index:999;
    background:rgba(0,0,0,.7);
    color:white;
    padding:10px;
    border-radius:10px;
    width:260px;
}

</style>
</head>

<body>

<div id="info">
    <h3 id="titulo">Cubo</h3>
    <p id="datos">
        Caras: 6<br>
        Aristas: 12<br>
        Vértices: 8
    </p>
</div>

<div id="menu">

<button class="cubo"
onclick="mostrarFigura('cubo')">
Cubo
</button>

<button class="esfera"
onclick="mostrarFigura('esfera')">
Esfera
</button>

<button class="cilindro"
onclick="mostrarFigura('cilindro')">
Cilindro
</button>

<button class="tetraedro"
onclick="mostrarFigura('tetraedro')">
Tetraedro
</button>

<button class="octaedro"
onclick="mostrarFigura('octaedro')">
Octaedro
</button>

</div>

<a-scene
embedded
arjs="sourceType:webcam;debugUIEnabled:false;">

<a-marker preset="hiro">

<!-- CUBO -->
<a-box
id="cubo"
position="0 0.7 0"
color="#2196F3"
animation="property: rotation;
to:0 360 0;
loop:true;
dur:8000;
easing:linear">
</a-box>

<!-- ESFERA -->
<a-sphere
id="esfera"
position="0 0.7 0"
radius="0.7"
color="#4CAF50"
visible="false"
animation="property: rotation;
to:0 360 0;
loop:true;
dur:8000;
easing:linear">
</a-sphere>

<!-- CILINDRO -->
<a-cylinder
id="cilindro"
position="0 0.7 0"
radius="0.5"
height="1.2"
color="#FF9800"
visible="false"
animation="property: rotation;
to:0 360 0;
loop:true;
dur:8000;
easing:linear">
</a-cylinder>

<!-- TETRAEDRO -->
<a-tetrahedron
id="tetraedro"
position="0 0.8 0"
radius="0.8"
color="#9C27B0"
visible="false"
animation="property: rotation;
to:360 360 0;
loop:true;
dur:8000;
easing:linear">
</a-tetrahedron>

<!-- OCTAEDRO -->
<a-octahedron
id="octaedro"
position="0 0.8 0"
radius="0.8"
color="#E91E63"
visible="false"
animation="property: rotation;
to:360 360 0;
loop:true;
dur:8000;
easing:linear">
</a-octahedron>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

const info = {

cubo:{
titulo:"Cubo",
texto:"Caras: 6<br>Aristas: 12<br>Vértices: 8"
},

esfera:{
titulo:"Esfera",
texto:"Superficie curva<br>No tiene aristas<br>No tiene vértices"
},

cilindro:{
titulo:"Cilindro",
texto:"2 bases circulares<br>1 superficie curva<br>Altura h"
},

tetraedro:{
titulo:"Tetraedro",
texto:"Caras: 4<br>Aristas: 6<br>Vértices: 4"
},

octaedro:{
titulo:"Octaedro",
texto:"Caras: 8<br>Aristas: 12<br>Vértices: 6"
}

};

function mostrarFigura(figura){

const figuras=[
'cubo',
'esfera',
'cilindro',
'tetraedro',
'octaedro'
];

figuras.forEach(f=>{
document
.getElementById(f)
.setAttribute('visible',false);
});

document
.getElementById(figura)
.setAttribute('visible',true);

document
.getElementById('titulo')
.innerHTML=info[figura].titulo;

document
.getElementById('datos')
.innerHTML=info[figura].texto;
}

</script>

</body>
</html>
