<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>RA Educativa - Sólidos Geométricos</title>

<!-- ==========================================================
     A-FRAME
     Motor 3D utilizado para crear los sólidos geométricos
========================================================== -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- ==========================================================
     AR.JS
     Biblioteca de Realidad Aumentada basada en marcadores
========================================================== -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>

html, body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* ==========================================================
   MENÚ RESPONSIVO
   ==========================================================

   - Visible encima de la cámara
   - Adaptable a móviles, tablets y PC
   - Scroll automático si el contenido crece
   - Permite agregar más sólidos en el futuro
*/
#menu{
    position:fixed;
    top:10px;
    left:10px;
    z-index:9999;

    display:flex;
    flex-direction:column;
    gap:8px;

    max-height:85vh;
    max-width:240px;

    overflow-y:auto;
    overflow-x:hidden;

    background:rgba(0,0,0,0.55);

    padding:10px;
    border-radius:12px;

    backdrop-filter:blur(4px);
}

#menu button{

    min-height:50px;
    min-width:180px;

    border:none;
    border-radius:8px;

    cursor:pointer;

    font-size:15px;
    font-weight:bold;

    color:white;
}

#btnCubo{
    background:#2196F3;
}

#btnEsfera{
    background:#4CAF50;
}

#btnCilindro{
    background:#FF9800;
}

#btnCono{
    background:#E91E63;
}

@media(max-width:600px){

    #menu{
        max-width:90vw;
        max-height:40vh;
    }

    #menu button{
        min-width:160px;
    }
}

</style>
</head>

<body>

<!-- ==========================================================
     MENÚ DE SELECCIÓN
========================================================== -->
<div id="menu">

    <button id="btnCubo">
        Cubo
    </button>

    <button id="btnEsfera">
        Esfera
    </button>

    <button id="btnCilindro">
        Cilindro Circular Recto
    </button>

    <button id="btnCono">
        Cono Circular Recto
    </button>

</div>

<!-- ==========================================================
     ESCENA AR
========================================================== -->
<a-scene

embedded

renderer="antialias:true; logarithmicDepthBuffer:true"

arjs="
trackingMethod: best;
sourceType: webcam;
debugUIEnabled: false;
">

<!-- ==========================================================
     MARCADOR HIRO
========================================================== -->
<a-marker preset="hiro">

    <!-- ======================================================
         CONTENEDOR GENERAL

         Todos los sólidos están centrados sobre el marcador.

         Escala moderada para que entren cómodamente sobre
         una hoja impresa en contexto escolar.
    ======================================================= -->
    <a-entity id="contenedor"
              position="0 0.5 0"
              scale="0.4 0.4 0.4">

        <!-- ==================================================
             CUBO
             Propiedades escolares:
             - 6 caras cuadradas congruentes
             - 12 aristas iguales
             - 8 vértices
        =================================================== -->
        <a-entity id="cubo">

            <!-- cuerpo -->
            <a-box
                color="#2196F3"
                depth="1"
                width="1"
                height="1"
                animation="
                    property: rotation;
                    to: 0 360 0;
                    loop:true;
                    dur:8000;
                    easing:linear;">
            </a-box>

            <!-- aristas visibles -->
            <a-box color="black"
                   wireframe="true"
                   depth="1.02"
                   width="1.02"
                   height="1.02"
                   animation="
                    property: rotation;
                    to: 0 360 0;
                    loop:true;
                    dur:8000;
                    easing:linear;">
            </a-box>

        </a-entity>

        <!-- ==================================================
             ESFERA
             Superficie perfectamente redonda.
        =================================================== -->
        <a-entity id="esfera" visible="false">

            <a-sphere
                radius="0.6"
                color="#4CAF50"
                segments-width="24"
                segments-height="24"
                animation="
                    property: rotation;
                    to: 0 360 0;
                    loop:true;
                    dur:8000;
                    easing:linear;">
            </a-sphere>

        </a-entity>

        <!-- ==================================================
             CILINDRO CIRCULAR RECTO

             Geométricamente:
             - Bases circulares paralelas
             - Bases congruentes
             - Eje perpendicular a las bases
        =================================================== -->
        <a-entity id="cilindro" visible="false">

            <a-cylinder
                radius="0.5"
                height="1.2"
                color="#FF9800"
                segments-radial="32"
                animation="
                    property: rotation;
                    to: 0 360 0;
                    loop:true;
                    dur:8000;
                    easing:linear;">
            </a-cylinder>

        </a-entity>

        <!-- ==================================================
             CONO CIRCULAR RECTO

             Geométricamente:
             - Base circular
             - Vértice alineado con el centro
             - Eje perpendicular a la base
        =================================================== -->
        <a-entity id="cono" visible="false">

            <a-cone
                radius-bottom="0.6"
                radius-top="0"
                height="1.2"
                color="#E91E63"
                segments-radial="32"
                animation="
                    property: rotation;
                    to: 0 360 0;
                    loop:true;
                    dur:8000;
                    easing:linear;">
            </a-cone>

        </a-entity>

    </a-entity>

</a-marker>

<!-- ==========================================================
     CÁMARA

     Configuración estable para móviles y tablets.
========================================================== -->
<a-entity camera></a-entity>

</a-scene>

<script>

/* ==========================================================
   REFERENCIAS A LOS SÓLIDOS
========================================================== */
const cubo = document.getElementById("cubo");
const esfera = document.getElementById("esfera");
const cilindro = document.getElementById("cilindro");
const cono = document.getElementById("cono");

/* ==========================================================
   OCULTAR TODOS LOS SÓLIDOS
========================================================== */
function ocultarTodos(){

    cubo.setAttribute("visible", false);
    esfera.setAttribute("visible", false);
    cilindro.setAttribute("visible", false);
    cono.setAttribute("visible", false);

}

/* ==========================================================
   MOSTRAR UN SOLO SÓLIDO

   Garantiza que únicamente una figura
   sea visible a la vez.
========================================================== */
function mostrar(id){

    ocultarTodos();

    document
        .getElementById(id)
        .setAttribute("visible", true);

}

/* ==========================================================
   BOTONES DEL MENÚ
========================================================== */
document
.getElementById("btnCubo")
.addEventListener("click", () => {
    mostrar("cubo");
});

document
.getElementById("btnEsfera")
.addEventListener("click", () => {
    mostrar("esfera");
});

document
.getElementById("btnCilindro")
.addEventListener("click", () => {
    mostrar("cilindro");
});

document
.getElementById("btnCono")
.addEventListener("click", () => {
    mostrar("cono");
});

/* ==========================================================
   FIGURA INICIAL
========================================================== */
mostrar("cubo");

</script>

</body>
</html>
