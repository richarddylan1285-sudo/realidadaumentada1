<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR - Sólidos Geométricos Educativos</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        /* Asegura que el contenedor de la cámara y el DOM ocupen todo el viewport sin barras de scroll parásitas */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fuerza al canvas de A-Frame a posicionarse de forma absoluta y llenar la pantalla */
        #ar-scene-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* INTERFAZ DE USUARIO (UI): Menú flotante con Scroll Responsivo */
        .ui-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            /* Scroll horizontal táctil si el contenido excede el ancho de la pantalla */
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            background: rgba(20, 24, 35, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 16px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 9999; /* Z-Index ultra alto para garantizar superposición sobre el canvas AR */
            scrollbar-width: none; /* Oculta scrollbar en Firefox */
        }

        /* Oculta scrollbar en Chrome, Safari y Opera */
        .ui-container::-webkit-scrollbar {
            display: none;
        }

        /* Estilización de los botones interactivos */
        .btn-solido {
            display: inline-block;
            padding: 10px 20px;
            margin-right: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #E2E8F0;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-solido:last-child {
            margin-right: 0;
        }

        /* Estado Activo para el sólido seleccionado */
        .btn-solido.active {
            color: #FFFFFF;
            background: #3B82F6;
            border-color: #60A5FA;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
            transform: scale(1.03);
        }

        /* Indicador educativo superior */
        .header-info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            z-index: 9999;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-info">Enfoca el marcador 'Hiro' para ver el cuerpo geométrico</div>

    <div class="ui-container">
        <button class="btn-solido active" onclick="cambiarSolido('cubo', this)">Cubo</button>
        <button class="btn-solido" onclick="cambiarSolido('esfera', this)">Esfera</button>
        <button class="btn-solido" onclick="cambiarSolido('cilindro', this)">Cilindro</button>
        <button class="btn-solido" onclick="cambiarSolido('cono', this)">Cono</button>
    </div>

    <div id="ar-scene-container">
        
        <a-scene 
            embedded 
            arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
            vr-mode-ui="enabled: false"
            gesture-detector
            style="width: 100%; height: 100%;">
            
            <a-marker preset="hiro" id="marcador-hiro" raycaster="objects: .clickable" emitevents="true">
                
                <a-entity 
                    id="grupo-maestro" 
                    position="0 0.2 0" 
                    scale="1 1 1"
                    class="clickable"
                    gesture-handler="minScale: 0.2; maxScale: 2.0">
                    
                    <a-entity id="solido-cubo" visible="true">
                        <a-box 
                            position="0 0 0" 
                            scale="0.4 0.4 0.4" 
                            color="#EF4444" 
                            material="opacity: 0.85; roughness: 0.3;">
                            <a-box 
                                scale="1.002 1.002 1.002" 
                                color="#FFFFFF" 
                                material="wireframe: true; wireframeLineWidth: 2;">
                            </a-box>
                        </a-box>
                    </a-entity>

                    <a-entity id="solido-esfera" visible="false">
                        <a-sphere 
                            position="0 0 0" 
                            radius="0.25" 
                            color="#10B981" 
                            material="opacity: 0.85; roughness: 0.3;">
                            <a-sphere 
                                radius="0.251" 
                                color="#FFFFFF" 
                                material="wireframe: true; wireframeLineWidth: 1.5;">
                            </a-sphere>
                        </a-sphere>
                    </a-entity>

                    <a-entity id="solido-cilindro" visible="false">
                        <a-cylinder 
                            position="0 0 0" 
                            radius="0.2" 
                            height="0.5" 
                            color="#F59E0B" 
                            material="opacity: 0.85; roughness: 0.3;">
                            <a-cylinder 
                                radius="0.201" 
                                height="0.502" 
                                color="#1E293B" 
                                material="wireframe: true; wireframeLineWidth: 2;">
                            </a-cylinder>
                        </a-cylinder>
                    </a-entity>

                    <a-entity id="solido-cono" visible="false">
                        <a-cone 
                            position="0 0 0" 
                            radius-bottom="0.25" 
                            radius-top="0" 
                            height="0.5" 
                            color="#8B5CF6" 
                            material="opacity: 0.85; roughness: 0.3;">
                            <a-cone 
                                radius-bottom="0.252" 
                                radius-top="0" 
                                height="0.502" 
                                color="#FFFFFF" 
                                material="wireframe: true; wireframeLineWidth: 2;">
                            </a-cone>
                        </a-cone>
                    </a-entity>

                </a-entity>
                
            </a-marker>

            <a-entity camera></a-entity>
            
        </a-scene>
    </div>

    <script>
        // Mapeo estructurado de las entidades 3D
        const solidos = {
            cubo: document.getElementById('solido-cubo'),
            esfera: document.getElementById('solido-esfera'),
            cilindro: document.getElementById('solido-cilindro'),
            cono: document.getElementById('solido-cono')
        };
        
        const grupoMaestro = document.getElementById('grupo-maestro');

        /**
         * Alternal la visibilidad de los sólidos geométricos y actualiza el estado de la UI
         * @param {string} seleccion - El ID del sólido que se desea mostrar
         * @param {HTMLElement} botonActivo - El elemento de botón presionado
         */
        function cambiarSolido(seleccion, botonActivo) {
            // 1. Alternar visibilidad en el árbol del DOM de A-Frame
            for (const clave in solidos) {
                if (clave === seleccion) {
                    solidos[clave].setAttribute('visible', 'true');
                } else {
                    solidos[clave].setAttribute('visible', 'false');
                }
            }

            // 2. Restablecer la escala del grupo maestro para evitar distorsiones acumulativas por zoom previo
            grupoMaestro.setAttribute('scale', '1 1 1');
            // Restablecer también la rotación por cortesía de usabilidad del estudiante
            grupoMaestro.setAttribute('rotation', '0 0 0');

            // 3. Actualizar clases CSS en los botones de la interfaz
            const botones = document.querySelectorAll('.btn-solido');
            botones.forEach(btn => btn.classList.remove('active'));
            botonActivo.classList.add('active');
        }

        /**
         * DISPARADOR DE SEGURIDAD (Manejo de autoplay de Webcam en navegadores modernos)
         * Mitiga los bloqueos estrictos de políticas de privacidad de iOS/Safari y Chrome Mobile.
         */
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const videoEl = document.querySelector('video');
                if (videoEl && videoEl.paused) {
                    videoEl.play().catch(err => {
                        console.warn("La reproducción automática de la cámara requirió interacción o falló:", err);
                    });
                }
            }, 1500); // Pequeña espera para permitir que AR.js inyecte y configure el tag de video
        });
    </script>
</body>
</html>
